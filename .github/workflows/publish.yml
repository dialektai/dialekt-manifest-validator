name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # for trusted publishing (no token needed)

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        run: uv publish
        # Uses PyPI Trusted Publisher — no PYPI_TOKEN secret needed.
        # Configure at: https://pypi.org/manage/account/publishing/
        # Publisher settings:
        #   Owner: vibecoderkz (or dialektai)
        #   Repo: dialekt-manifest-validator
        #   Workflow: publish.yml
        #   Environment: pypi
