name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

      - name: Validate spec examples
        run: |
          uv run dialekt-validate-manifest \
            tests/fixtures/valid/sql_analyst.agent.yaml \
            tests/fixtures/valid/scheduled_report.agent.yaml \
            tests/fixtures/valid/carousel_generator.agent.yaml \
            tests/fixtures/valid/code_review.agent.yaml
