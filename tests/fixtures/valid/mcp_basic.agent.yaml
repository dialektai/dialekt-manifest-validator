spec_version: "1.1.0"
minimum_dialekt_version: "0.20.0"

metadata:
  id: "7c9e6679-7425-40de-944b-e07fc1f90ae7"
  name: "MCP Basic Agent"
  description: "Minimal manifest exercising the spec 1.1.0 mcp_servers block"
  version: "1.0.0"
  author:
    name: "dialekt team"
    email: "team@dialekt.ai"
  created_at: "2026-04-24T10:00:00+06:00"
  updated_at: "2026-04-24T10:00:00+06:00"

model:
  preferred: "gemma3:12b"
  min_context_window: 8192
  requirements:
    min_ram_gb: 8
    min_vram_gb: 0
    recommended_ram_gb: 16
  parameters:
    temperature: 0.7
    top_p: 0.9
    max_tokens: 2048

system_prompt: |
  You are a helpful assistant that can use MCP servers.

capabilities:
  groups:
    - filesystem_read
    - mcp_tools
  exceptions: []

autonomy:
  recommended: "ask-before-write"
  max_allowed: "autonomous"

input:
  type: "chat"

output:
  format: "markdown"
  streaming: true
  destination:
    type: "notification"

trigger:
  type: "interactive"

mcp_servers:
  - name: "github"
    description: "GitHub repo operations"
    transport: "stdio"
    command: ["npx", "-y", "@modelcontextprotocol/server-github"]
    env:
      GITHUB_TOKEN: "${secrets.github_token}"
    timeout_seconds: 30

  - name: "internal-jira"
    description: "Internal Jira over Streamable HTTP"
    transport: "http"
    url: "https://jira.company.internal/mcp"
    auth:
      type: "bearer"
      token: "${secrets.jira_token}"
    timeout_seconds: 20

secrets_required:
  - name: "github_token"
    description: "GitHub personal access token with repo scope"
  - name: "jira_token"
    description: "Jira bearer token"
